<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VANZZCRASHER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #050505;
            background-image: radial-gradient(circle at center, #1a0000 0%, #000 100%);
            overflow: hidden;
        }

        /* TULISAN VANZZCRASHER GEDE */
        .brand-title {
            position: absolute;
            top: 10%;
            font-size: 60px;
            font-weight: 900;
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #660000;
            animation: pulse 1.5s infinite;
            z-index: 1;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; filter: blur(2px); }
            100% { transform: scale(1); opacity: 1; }
        }

        .login-box {
            position: relative;
            width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            border: 1px solid rgba(255, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(0,0,0,1);
            text-align: center;
            z-index: 2;
        }

        .login-box h2 {
            color: #fff;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 5px;
        }

        .input-group { position: relative; margin-bottom: 30px; }
        .input-group input {
            width: 100%; padding: 10px 5px; font-size: 16px; color: #fff;
            background: transparent; border: none; border-bottom: 2px solid #333;
            outline: none; transition: 0.5s;
        }

        .input-group label {
            position: absolute; top: 10px; left: 5px; color: #888;
            transition: 0.5s; pointer-events: none;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -20px; left: 0; color: #ff0000; font-size: 12px; font-weight: bold;
        }

        .input-group input:focus { border-bottom: 2px solid #ff0000; }

        button {
            width: 100%; padding: 12px; background: #ff0000; border: none;
            border-radius: 5px; color: #fff; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.5s; box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        button:hover { background: #cc0000; box-shadow: 0 0 30px #ff0000; transform: translateY(-3px); }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .brand-title { font-size: 35px; letter-spacing: 5px; }
            .login-box { width: 90%; }
        }
    </style>
</head>
<body>

    <div class="brand-title">VANZZCRASHER</div>

    <div class="login-box">
        <h2>AUTHENTICATION</h2>
        <form autocomplete="off">
            <div class="input-group">
                <input type="text" required>
                <label>Access Key</label>
            </div>
            <div class="input-group">
                <input type="password" required>
                <label>Passcode</label>
            </div>
            <button type="submit">ENTER SYSTEM</button>
        </form>
    </div>

</body>
</html>
