<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Vanzzcrasher Database | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at top, #080808 0%, #0f0f0f 45%, #050505 100%);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    /* efek asap mewah */
    .smoke {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(circle at 25% 35%, rgba(255, 64, 64, 0.08), transparent 20%),
                  radial-gradient(circle at 70% 60%, rgba(255, 100, 100, 0.06), transparent 18%);
      animation: smokeMove 14s infinite alternate ease-in-out;
      filter: blur(20px);
    }

    @keyframes smokeMove {
      0% { background-position: 25% 35%, 70% 60%; }
      100% { background-position: 23% 38%, 72% 58%; }
    }

    /* container kaca */
    .glass-card {
      position: relative;
      z-index: 10;
      max-width: 460px;
      width: 100%;
      background: rgba(10, 10, 10, 0.65);
      backdrop-filter: blur(12px) saturate(160%);
      border-radius: 32px;
      border: 1px solid rgba(212, 175, 55, 0.2);
      padding: 32px 28px 38px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 68, 68, 0.05);
      transition: all 0.2s;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: block;
      margin: 0 auto 16px;
      border: 2px solid #ff4444;
      box-shadow: 0 0 20px rgba(255, 68, 68, 0.3);
      object-fit: cover;
    }

    .title {
      font-family: 'Orbitron', monospace;
      text-align: center;
      font-size: 26px;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #fff, #ffb3b3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 6px;
    }

    .sub {
      text-align: center;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 28px;
      border-bottom: 1px dashed rgba(255, 68, 68, 0.3);
      display: inline-block;
      width: auto;
      margin-left: auto;
      margin-right: auto;
      padding-bottom: 8px;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      margin: 12px 0;
      background: rgba(20, 20, 30, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      color: white;
      font-size: 15px;
      font-weight: 500;
      outline: none;
      transition: all 0.2s;
    }

    .input-field:focus {
      border-color: #ff4444;
      box-shadow: 0 0 10px rgba(255, 68, 68, 0.3);
      background: rgba(0, 0, 0, 0.5);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: linear-gradient(95deg, #ff4444, #b91c3c);
      border: none;
      border-radius: 40px;
      font-weight: 700;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 5px 20px rgba(255, 68, 68, 0.3);
      letter-spacing: 1px;
    }

    .btn-login:hover {
      transform: scale(1.02);
      background: linear-gradient(95deg, #ff5e5e, #cf2045);
      box-shadow: 0 8px 28px rgba(255, 68, 68, 0.5);
    }

    .status-box {
      margin-top: 20px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 18px;
      padding: 12px 16px;
      font-size: 13px;
      font-family: monospace;
      color: #ffc9c9;
      border-left: 4px solid #ff4444;
      word-break: break-word;
    }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
    }

    hr {
      border-color: rgba(255, 68, 68, 0.2);
      margin: 10px 0;
    }
  </style>
</head>
<body>
<div class="smoke"></div>

<div class="glass-card">
  <!-- Logo (bisa diganti link gambar sendiri) -->
  <img class="logo" src="https://files.catbox.moe/sa3j6b.jpg" alt="logo vanzzcrasher" onerror="this.src='https://placehold.co/80x80?text=V'">
  
  <div class="title">VANZZCRASHER</div>
  <div class="title" style="font-size: 18px; letter-spacing: 1px; margin-top: -8px;">⚡ DATABASE ⚡</div>
  <div class="sub">Akses terbatas • otentikasi privat</div>

  <!-- Form login sederhana -->
  <input type="text" id="loginUsername" class="input-field" placeholder="Username" autocomplete="off">
  <input type="password" id="loginPassword" class="input-field" placeholder="Password" autocomplete="off">
  <button class="btn-login" onclick="handleLogin()">→ MASUK KE DASHBOARD ←</button>

  <div id="loginMessage" class="status-box">
    🔐 Masukkan kredensial yang benar.
  </div>
  <div class="footer">
    © 2025 Vanzzcrasher • Secure Entry
  </div>
</div>

<script>
  // ========== KONFIGURASI LOGIN ==========
  // Anda bisa ubah username & password default sesuai keinginan
  const VALID_USERNAME = "vanzz";
  const VALID_PASSWORD = "crasher";
  
  // Opsional: tambahkan akun cadangan (misal untuk demo)
  const EXTRA_ACCOUNTS = [
    { user: "admin", pass: "admin123" },
    { user: "Gyzen", pass: "Vtx" }    // legacy dari kode asli (opsional)
  ];

  function handleLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const msgDiv = document.getElementById('loginMessage');

    if (!username || !password) {
      msgDiv.innerHTML = "❌ Isi username dan password terlebih dahulu.";
      return;
    }

    // Cek akun utama
    if (username === VALID_USERNAME && password === VALID_PASSWORD) {
      loginSuccess(username);
      return;
    }

    // Cek akun tambahan
    const found = EXTRA_ACCOUNTS.find(acc => acc.user === username && acc.pass === password);
    if (found) {
      loginSuccess(username);
      return;
    }

    // Gagal login
    msgDiv.innerHTML = "⛔ Login gagal! Username atau password salah.";
    msgDiv.style.borderLeftColor = "#ff6666";
  }

  function loginSuccess(username) {
    const msgDiv = document.getElementById('loginMessage');
    msgDiv.innerHTML = `✅ Berhasil login sebagai <strong>${username}</strong>. Selamat datang di Vanzzcrasher Database.`;
    msgDiv.style.borderLeftColor = "#44ff44";
    
    // Optional: simpan sesi sederhana (localStorage)
    localStorage.setItem("vz_user", JSON.stringify({ user: username, time: new Date().toISOString() }));
    
    // Tindakan setelah login: bisa redirect, alert, atau tampilkan konten rahasia.
    // Karena hanya form login, kita beri notifikasi dan ubah tombol.
    setTimeout(() => {
      alert(`✨ Selamat datang ${username}!\n🔒 Anda telah terautentikasi ke Vanzzcrasher Database. (Demo login selesai)`);
      // Jika ingin redirect ke halaman lain, aktifkan baris di bawah:
      // window.location.href = "dashboard.html";
    }, 100);
  }

  // (Optional) Cek apakah sudah login sebelumnya
  window.onload = function() {
    const saved = localStorage.getItem("vz_user");
    if (saved) {
      try {
        const data = JSON.parse(saved);
        if (data.user) {
          document.getElementById('loginMessage').innerHTML = `🔄 Sesi sebelumnya ditemukan sebagai <strong>${data.user}</strong>. Silakan login ulang jika ingin.`;
        }
      } catch(e) {}
    }
  };
</script>
</body>
</html>
